  <circle cx="42" cy="42" r="4" fill="#ddd"/>
  <circle cx="54" cy="36" r="4" fill="#ddd"/>
  <circle cx="64" cy="48" r="4" fill="#ddd"/>
  <circle cx="50" cy="62" r="4" fill="#ddd"/>
  <circle cx="36" cy="58" r="4" fill="#ddd"/>
