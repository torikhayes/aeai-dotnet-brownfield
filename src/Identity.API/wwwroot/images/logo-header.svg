<svg viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-text { font-family: Arial, sans-serif; font-weight: bold; }
      .go-text { font-size: 32px; fill: #00857D; letter-spacing: -1px; }
      .tagline { font-size: 10px; fill: #999; letter-spacing: 1px; }
    </style>
  </defs>
  
  <!-- Golf Ball Icon -->
  <circle cx="30" cy="40" r="18" fill="none" stroke="#00857D" stroke-width="2"/>
  <circle cx="30" cy="40" r="15" fill="#ffffff" stroke="#00857D" stroke-width="1"/>
  <!-- Dimples on ball -->
  <circle cx="28" cy="38" r="1.5" fill="#00857D"/>
  <circle cx="32" cy="38" r="1.5" fill="#00857D"/>
  <circle cx="30" cy="42" r="1.5" fill="#00857D"/>
  <circle cx="26" cy="40" r="1.5" fill="#00857D"/>
  <circle cx="34" cy="40" r="1.5" fill="#00857D"/>
  
  <!-- Golf Club Head -->
  <line x1="35" y1="30" x2="45" y2="20" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <circle cx="46" cy="19" r="3" fill="#333"/>
  
  <!-- Text -->
  <text x="62" y="50" class="logo-text go-text">Golf Odyssey</text>
  <text x="62" y="63" class="logo-text tagline">PREMIUM MARKETPLACE</text>
</svg>
